services:
  sendthen:
    build: .
    ports:
      - "3000:3000"
      # uncomment to receive email directly (MX → this host)
      # - "25:2525"
    environment:
      # public URL of this instance (needed for open/click tracking + unsubscribe links)
      SENDTHEN_PUBLIC_URL: ${SENDTHEN_PUBLIC_URL:-http://localhost:3000}
      # instance-wide default transport: sandbox | smtp | ses | direct
      SENDTHEN_MAIL_MODE: ${SENDTHEN_MAIL_MODE:-sandbox}
      SMTP_URL: ${SMTP_URL:-}
      # set to "true" to block public signups after the first (admin) account
      DISABLE_SIGNUP: ${DISABLE_SIGNUP:-false}
      AUTH_SECRET: ${AUTH_SECRET:-}
      # inbound email: SMTP listener port (empty = off) + HTTP ingest key
      SENDTHEN_SMTP_PORT: ${SENDTHEN_SMTP_PORT:-}
      SENDTHEN_INGEST_KEY: ${SENDTHEN_INGEST_KEY:-}
    volumes:
      - sendthen-data:/data
    restart: unless-stopped

volumes:
  sendthen-data:
