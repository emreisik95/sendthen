name: Deploy to CapRover

# Auto-deploy the app on every push to main. Uses a CapRover *app token*
# (stable, per-app) rather than a CLI login (which expires), so this keeps
# working unattended.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to CapRover
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: "${{ secrets.CAPROVER_SERVER }}"
          app: "${{ secrets.CAPROVER_APP }}"
          token: "${{ secrets.CAPROVER_APP_TOKEN }}"
